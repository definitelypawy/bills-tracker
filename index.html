<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bills Payment Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --bg-secondary: #f5f5f3;
      --bg-tertiary: #eeede8;
      --text: #1a1a18;
      --text-secondary: #6b6b67;
      --text-tertiary: #9e9e9a;
      --border: rgba(0,0,0,0.12);
      --border-md: rgba(0,0,0,0.22);
      --radius-md: 8px;
      --radius-lg: 12px;
      --font: 'Inter', system-ui, sans-serif;
      --green-bg: #E1F5EE;
      --green-text: #0F6E56;
      --green-toggle: #1D9E75;
      --blue-bg: #E6F1FB;
      --blue-text: #185FA5;
      --amber-bg: #FAEEDA;
      --amber-text: #854F0B;
      --red-bg: #FAECE7;
      --red-text: #993C1D;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1e1e1c;
        --bg-secondary: #2a2a28;
        --bg-tertiary: #181816;
        --text: #f0efe8;
        --text-secondary: #a0a09a;
        --text-tertiary: #6b6b67;
        --border: rgba(255,255,255,0.1);
        --border-md: rgba(255,255,255,0.2);
        --green-bg: #04342C;
        --green-text: #9FE1CB;
        --blue-bg: #042C53;
        --blue-text: #B5D4F4;
        --amber-bg: #412402;
        --amber-text: #FAC775;
        --red-bg: #4A1B0C;
        --red-text: #F5C4B3;
      }
    }

    body {
      font-family: var(--font);
      background: var(--bg-tertiary);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container { max-width: 720px; margin: 0 auto; }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
    }

    h1 { font-size: 22px; font-weight: 500; color: var(--text); }

    .logout-btn {
      background: none;
      border: 0.5px solid var(--border-md);
      border-radius: var(--radius-md);
      padding: 6px 14px;
      font-size: 13px;
      color: var(--text-secondary);
      font-family: var(--font);
      cursor: pointer;
    }

    .logout-btn:hover { background: var(--bg-secondary); color: var(--text); }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      gap: 12px;
    }

    .month-nav { display: flex; align-items: center; gap: 12px; }

    .month-label {
      font-size: 18px;
      font-weight: 500;
      color: var(--text);
      min-width: 160px;
      text-align: center;
    }

    .nav-btn {
      background: var(--bg);
      border: 0.5px solid var(--border-md);
      border-radius: var(--radius-md);
      width: 32px;
      height: 32px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text);
      font-size: 16px;
    }

    .nav-btn:hover { background: var(--bg-secondary); }

    .summary-cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 1.5rem;
    }

    .stat { background: var(--bg-secondary); border-radius: var(--radius-md); padding: 12px 14px; }
    .stat-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
    .stat-value { font-size: 22px; font-weight: 500; color: var(--text); }
    .stat-value.paid  { color: var(--green-text); }
    .stat-value.unpaid { color: var(--red-text); }

    .card {
      background: var(--bg);
      border-radius: var(--radius-lg);
      border: 0.5px solid var(--border);
      overflow: hidden;
    }

    table { width: 100%; border-collapse: collapse; font-size: 14px; }

    th {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-secondary);
      text-align: left;
      padding: 10px 14px;
      border-bottom: 0.5px solid var(--border);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      background: var(--bg-secondary);
    }

    td { padding: 10px 14px; border-bottom: 0.5px solid var(--border); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: var(--bg-secondary); }

    .bill-name { font-weight: 500; color: var(--text); font-size: 14px; }

    .category-badge {
      display: inline-block;
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 20px;
      font-weight: 500;
      margin-top: 3px;
    }

    .cat-utility { background: var(--green-bg); color: var(--green-text); }
    .cat-credit  { background: var(--blue-bg);  color: var(--blue-text);  }
    .cat-housing { background: var(--amber-bg); color: var(--amber-text); }

    .due-input {
      background: var(--bg-secondary);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-md);
      padding: 5px 8px;
      font-size: 13px;
      color: var(--text);
      width: 150px;
      font-family: var(--font);
      cursor: pointer;
    }

    .due-input:focus { outline: none; border-color: var(--border-md); }

    .overdue-badge {
      display: inline-block;
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 20px;
      font-weight: 500;
      background: var(--red-bg);
      color: var(--red-text);
      margin-top: 4px;
    }

    .toggle-wrap { display: flex; align-items: center; gap: 8px; }
    .toggle { position: relative; width: 40px; height: 22px; cursor: pointer; }
    .toggle input { opacity: 0; width: 0; height: 0; }

    .slider {
      position: absolute;
      inset: 0;
      background: var(--border-md);
      border-radius: 22px;
      transition: background 0.2s;
    }

    .slider:before {
      content: '';
      position: absolute;
      width: 16px; height: 16px;
      left: 3px; top: 3px;
      background: white;
      border-radius: 50%;
      transition: transform 0.2s;
    }

    input:checked + .slider { background: var(--green-toggle); }
    input:checked + .slider:before { transform: translateX(18px); }

    .paid-label { font-size: 12px; font-weight: 500; }
    .paid-label.yes { color: var(--green-text); }
    .paid-label.no  { color: var(--text-tertiary); }

    @media (max-width: 540px) {
      th, td { padding: 8px 10px; }
      .due-input { width: 130px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="top-bar">
      <h1>Bills Payment Tracker</h1>
      <button class="logout-btn" onclick="logout()">Sign out</button>
    </div>

    <div class="header">
      <div class="month-nav">
        <button class="nav-btn" onclick="changeMonth(-1)">&#8592;</button>
        <div class="month-label" id="monthLabel"></div>
        <button class="nav-btn" onclick="changeMonth(1)">&#8594;</button>
      </div>
    </div>

    <div class="summary-cards">
      <div class="stat">
        <div class="stat-label">Total bills</div>
        <div class="stat-value" id="totalCount">11</div>
      </div>
      <div class="stat">
        <div class="stat-label">Paid</div>
        <div class="stat-value paid" id="paidCount">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">Unpaid</div>
        <div class="stat-value unpaid" id="unpaidCount">11</div>
      </div>
    </div>

    <div class="card">
      <table>
        <thead>
          <tr>
            <th>Bill</th>
            <th>Due date</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="billsBody"></tbody>
      </table>
    </div>
  </div>

  <script>
    // ── Auth guard ────────────────────────────────────────────────────────
    if (sessionStorage.getItem('bt_auth') !== 'true') {
      window.location.href = 'login.html';
    }

    function logout() {
      sessionStorage.removeItem('bt_auth');
      window.location.href = 'login.html';
    }
    // ─────────────────────────────────────────────────────────────────────

    const BILLS = [
      { id: 'rent',        name: 'Rent',                   cat: 'housing', defaultDay: 15   },
      { id: 'insurance',   name: 'Insurance',              cat: 'utility', defaultDay: 'last' },
      { id: 'internet',    name: 'Internet',               cat: 'utility', defaultDay: 20   },
      { id: 'electricity', name: 'Electricity',            cat: 'utility', defaultDay: 15   },
      { id: 'phone',       name: 'Phone Bill',             cat: 'utility', defaultDay: 13   },
      { id: 'water',       name: 'Water Bill',             cat: 'utility', defaultDay: 1    },
      { id: 'ub_cc',       name: 'UB Credit Card',         cat: 'credit',  defaultDay: 30   },
      { id: 'maya_cc',     name: 'Maya Credit Card',       cat: 'credit',  defaultDay: 30   },
      { id: 'bpi_cc',      name: 'BPI Credit Card',        cat: 'credit',  defaultDay: 30   },
      { id: 'rcbc_gold',   name: 'RCBC Gold Credit Card',  cat: 'credit',  defaultDay: 15   },
      { id: 'rcbc_black',  name: 'RCBC Black Credit Card', cat: 'credit',  defaultDay: 15   },
    ];

    const CAT_LABELS = { housing: 'Housing', utility: 'Utility', credit: 'Credit Card' };
    const CAT_CLASS   = { housing: 'cat-housing', utility: 'cat-utility', credit: 'cat-credit' };

    const today = new Date();
    let currentYear  = today.getFullYear();
    let currentMonth = today.getMonth();

    function pad(n) { return String(n).padStart(2, '0'); }

    function storageKey(billId, y, m) { return `bill_${billId}_${y}_${m}`; }

    function getDefaultDue(bill, y, m) {
      const lastDay = new Date(y, m + 1, 0).getDate();
      const day = bill.defaultDay === 'last' ? lastDay : Math.min(bill.defaultDay, lastDay);
      return `${y}-${pad(m + 1)}-${pad(day)}`;
    }

    function loadState(billId, bill) {
      const raw = localStorage.getItem(storageKey(billId, currentYear, currentMonth));
      if (raw) return JSON.parse(raw);
      return { due: getDefaultDue(bill, currentYear, currentMonth), paid: false };
    }

    function saveState(billId, state) {
      localStorage.setItem(storageKey(billId, currentYear, currentMonth), JSON.stringify(state));
    }

    const states = {};

    function getMinMax() {
      const y = currentYear, m = pad(currentMonth + 1);
      const lastDay = new Date(currentYear, currentMonth + 1, 0).getDate();
      return { min: `${y}-${m}-01`, max: `${y}-${m}-${pad(lastDay)}` };
    }

    function render() {
      const MONTHS = ['January','February','March','April','May','June',
                      'July','August','September','October','November','December'];
      document.getElementById('monthLabel').textContent = `${MONTHS[currentMonth]} ${currentYear}`;

      for (const bill of BILLS) states[bill.id] = loadState(bill.id, bill);

      const tbody = document.getElementById('billsBody');
      tbody.innerHTML = '';

      const { min, max } = getMinMax();
      const todayStr = `${today.getFullYear()}-${pad(today.getMonth()+1)}-${pad(today.getDate())}`;
      const isCurrentMonth = today.getFullYear() === currentYear && today.getMonth() === currentMonth;

      let paidCount = 0;

      for (const bill of BILLS) {
        const state = states[bill.id];
        if (state.paid) paidCount++;

        const isOverdue = !state.paid && state.due && isCurrentMonth && state.due < todayStr;

        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>
            <div class="bill-name">${bill.name}</div>
            <span class="category-badge ${CAT_CLASS[bill.cat]}">${CAT_LABELS[bill.cat]}</span>
          </td>
          <td>
            <input class="due-input" type="date" min="${min}" max="${max}" value="${state.due}"
              onchange="updateDue('${bill.id}', this.value)" />
            ${isOverdue ? '<div class="overdue-badge">Overdue</div>' : ''}
          </td>
          <td>
            <div class="toggle-wrap">
              <label class="toggle">
                <input type="checkbox" ${state.paid ? 'checked' : ''}
                  onchange="togglePaid('${bill.id}', this.checked)" />
                <span class="slider"></span>
              </label>
              <span class="paid-label ${state.paid ? 'yes' : 'no'}">
                ${state.paid ? 'Paid' : 'Unpaid'}
              </span>
            </div>
          </td>
        `;
        tbody.appendChild(tr);
      }

      document.getElementById('paidCount').textContent   = paidCount;
      document.getElementById('unpaidCount').textContent = BILLS.length - paidCount;
    }

    function updateDue(billId, value) {
      states[billId].due = value;
      saveState(billId, states[billId]);
      render();
    }

    function togglePaid(billId, checked) {
      states[billId].paid = checked;
      saveState(billId, states[billId]);
      render();
    }

    function changeMonth(dir) {
      currentMonth += dir;
      if (currentMonth < 0)  { currentMonth = 11; currentYear--; }
      if (currentMonth > 11) { currentMonth = 0;  currentYear++; }
      render();
    }

    render();
  </script>
</body>
</html>
