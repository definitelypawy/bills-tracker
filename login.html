<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bills Tracker — Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --bg-secondary: #f5f5f3;
      --bg-tertiary: #eeede8;
      --text: #1a1a18;
      --text-secondary: #6b6b67;
      --text-tertiary: #9e9e9a;
      --border: rgba(0,0,0,0.12);
      --border-md: rgba(0,0,0,0.22);
      --radius-md: 8px;
      --radius-lg: 12px;
      --green-toggle: #1D9E75;
      --green-text: #0F6E56;
      --red-text: #993C1D;
      --red-bg: #FAECE7;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1e1e1c;
        --bg-secondary: #2a2a28;
        --bg-tertiary: #181816;
        --text: #f0efe8;
        --text-secondary: #a0a09a;
        --text-tertiary: #6b6b67;
        --border: rgba(255,255,255,0.1);
        --border-md: rgba(255,255,255,0.2);
        --red-bg: #4A1B0C;
        --red-text: #F5C4B3;
      }
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg-tertiary);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .card {
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 380px;
    }

    .logo {
      width: 40px;
      height: 40px;
      background: var(--green-toggle);
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.5rem;
    }

    .logo svg { width: 22px; height: 22px; fill: white; }

    h1 {
      font-size: 20px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 2rem;
    }

    .field { margin-bottom: 1rem; }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      background: var(--bg-secondary);
      border: 0.5px solid var(--border-md);
      border-radius: var(--radius-md);
      padding: 10px 12px;
      font-size: 14px;
      color: var(--text);
      font-family: inherit;
      transition: border-color 0.15s;
    }

    input[type="text"]:focus,
    input[type="password"]:focus {
      outline: none;
      border-color: var(--green-toggle);
    }

    .password-wrap { position: relative; }

    .password-wrap input { padding-right: 40px; }

    .toggle-pw {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-tertiary);
      padding: 4px;
      display: flex;
      align-items: center;
    }

    .toggle-pw:hover { color: var(--text-secondary); }
    .toggle-pw svg { width: 16px; height: 16px; }

    .error {
      display: none;
      background: var(--red-bg);
      color: var(--red-text);
      font-size: 13px;
      padding: 10px 12px;
      border-radius: var(--radius-md);
      margin-bottom: 1rem;
    }

    .error.show { display: block; }

    .btn {
      width: 100%;
      background: var(--green-toggle);
      color: white;
      border: none;
      border-radius: var(--radius-md);
      padding: 11px;
      font-size: 14px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.15s;
      margin-top: 0.5rem;
    }

    .btn:hover { opacity: 0.88; }
    .btn:active { opacity: 0.75; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M19 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2zm-7 14H7v-2h5v2zm5-4H7v-2h10v2zm0-4H7V7h10v2z"/>
      </svg>
    </div>

    <h1>Bills Tracker</h1>
    <p class="subtitle">Sign in to manage your payments</p>

    <div class="error" id="errorMsg">Incorrect username or password.</div>

    <div class="field">
      <label for="username">Username</label>
      <input type="text" id="username" placeholder="Enter username" autocomplete="username" />
    </div>

    <div class="field">
      <label for="password">Password</label>
      <div class="password-wrap">
        <input type="password" id="password" placeholder="Enter password" autocomplete="current-password" />
        <button class="toggle-pw" type="button" onclick="togglePw()" title="Show/hide password">
          <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    <button class="btn" onclick="handleLogin()">Sign in</button>
  </div>

  <script>
    // ── Change these credentials ──────────────────────────────────────────
    const VALID_USERNAME = 'definitelypawy';
    const VALID_PASSWORD = 'LalisaManoban!327';
    // ─────────────────────────────────────────────────────────────────────

    if (sessionStorage.getItem('bt_auth') === 'true') {
      window.location.href = 'index.html';
    }

    function handleLogin() {
      const user = document.getElementById('username').value.trim();
      const pass = document.getElementById('password').value;
      const err  = document.getElementById('errorMsg');

      if (user === VALID_USERNAME && pass === VALID_PASSWORD) {
        sessionStorage.setItem('bt_auth', 'true');
        window.location.href = 'index.html';
      } else {
        err.classList.add('show');
        document.getElementById('password').value = '';
        document.getElementById('password').focus();
      }
    }

    document.getElementById('password').addEventListener('keydown', e => {
      if (e.key === 'Enter') handleLogin();
    });

    document.getElementById('username').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('password').focus();
    });

    let pwVisible = false;
    function togglePw() {
      pwVisible = !pwVisible;
      const input = document.getElementById('password');
      const icon  = document.getElementById('eyeIcon');
      input.type  = pwVisible ? 'text' : 'password';
      icon.innerHTML = pwVisible
        ? `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
           <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
           <line x1="1" y1="1" x2="23" y2="23"/>`
        : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
           <circle cx="12" cy="12" r="3"/>`;
    }
  </script>
</body>
</html>
